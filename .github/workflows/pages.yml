# Deploy the static game to GitHub Pages (optional).
# After merge to main: Settings → Pages → Source: GitHub Actions → add custom domain pixelcity.quest
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Build CSS (avoids cdn.tailwindcss.com at runtime)
        run: npm ci && npm run build:css
      - name: Prepare site root
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets vendor _site/
          cp config.js _site/
      - name: Inject Supabase (repo or "github-pages" environment secrets — any one URL + one key name works)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: node scripts/inject-supabase-config.mjs _site/index.html
      - name: Warn if Supabase keys missing (site will show server not configured)
        run: |
          if grep -qF '"key":""' _site/index.html; then
            echo "::warning::Supabase anon key missing in deploy. Add Repository secrets (or Environment secrets for github-pages): SUPABASE_URL or SUPABASE_PROJECT_URL, and SUPABASE_ANON_KEY or SUPABASE_PUBLISHABLE_KEY. Then re-run this workflow."
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
