# Deploy the static game to GitHub Pages (optional).
# After merge to main: Settings → Pages → Source: GitHub Actions → add custom domain pixelcity.quest
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Build CSS (avoids cdn.tailwindcss.com at runtime)
        run: npm ci && npm run build:css
      - name: Prepare site root
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets vendor _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
