# Deploy the static game to GitHub Pages (optional).
# After merge to main: Settings → Pages → Source: GitHub Actions → add custom domain pixelcity.quest
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Build CSS (avoids cdn.tailwindcss.com at runtime)
        run: npm ci && npm run build:css
      - name: Prepare site root
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets vendor _site/
          cp config.js supabase-config.js _site/
      - name: Write supabase-config.js + embed keys in index.html (works even if only HTML is mirrored)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          node scripts/write-supabase-config.mjs _site/supabase-config.js
          node scripts/inject-supabase-inline.mjs _site/index.html
      - name: Warn if Supabase keys missing
        run: |
          if grep -qF "window.__SUPABASE_ANON_KEY__ = \"\"" _site/supabase-config.js; then
            echo "::warning::Supabase secrets empty. Add to Repository secrets AND/OR Environment secrets for \"github-pages\": SUPABASE_PROJECT_URL, SUPABASE_ANON_KEY (or SUPABASE_PUBLISHABLE_KEY). Re-run Deploy. Custom domains (e.g. pixelcity.best) must use this workflow output or paste keys into supabase-config.js on the host."
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
