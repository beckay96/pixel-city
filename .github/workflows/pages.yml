# Deploy the static game to GitHub Pages (optional).
# After merge to main: Settings → Pages → Source: GitHub Actions → add custom domain pixelcity.quest
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Build CSS (avoids cdn.tailwindcss.com at runtime)
        run: npm ci && npm run build:css
      - name: Prepare site root
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets vendor _site/
          cp config.js supabase-config.js _site/
          # GitHub Pages SPA fallback: short invite links like /AB3D7K are 404s.
          # 404.html detects a join-code path segment and redirects to /?join=CODE,
          # which consumeJoinFromUrl handles (legacy ?join= fallback still works).
          cat > _site/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8">
          <script>
            var seg = location.pathname.split('/').filter(Boolean).pop() || '';
            var base = location.href.slice(0, location.href.indexOf(location.pathname)) + '/';
            if (/^[A-Z0-9]{4,8}$/i.test(seg)) {
              location.replace(base + '?join=' + encodeURIComponent(seg.toUpperCase()));
            } else {
              location.replace(base);
            }
          </script>
          </head><body></body></html>
          EOF
      - name: Check Supabase secrets (Codespaces secrets do NOT apply — use Repository or Environment)
        env:
          VU: ${{ secrets.VITE_SUPABASE_URL }}
          VK: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SU: ${{ secrets.SUPABASE_URL }}
          SPU: ${{ secrets.SUPABASE_PROJECT_URL }}
          SPK: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SAK: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "## Supabase → GitHub Pages" >> "$GITHUB_STEP_SUMMARY"
          URL_OK=0; KEY_OK=0
          if [ -n "$VU" ] || [ -n "$SPU" ] || [ -n "$SU" ]; then URL_OK=1; echo "- ✅ URL secret found (VITE_SUPABASE_URL or SUPABASE_PROJECT_URL or SUPABASE_URL)" >> "$GITHUB_STEP_SUMMARY"; fi
          if [ -n "$VK" ] || [ -n "$SPK" ] || [ -n "$SAK" ]; then KEY_OK=1; echo "- ✅ Client key found (VITE_SUPABASE_PUBLISHABLE_KEY or SUPABASE_PUBLISHABLE_KEY or SUPABASE_ANON_KEY)" >> "$GITHUB_STEP_SUMMARY"; fi
          if [ "$URL_OK" -eq 0 ]; then echo "- ❌ **Missing URL** — add \`VITE_SUPABASE_URL\` (preferred) or \`SUPABASE_PROJECT_URL\` under **Settings → Secrets → Actions** or **Environments → github-pages**" >> "$GITHUB_STEP_SUMMARY"; fi
          if [ "$KEY_OK" -eq 0 ]; then echo "- ❌ **Missing key** — add \`VITE_SUPABASE_PUBLISHABLE_KEY\` (preferred) or \`SUPABASE_PUBLISHABLE_KEY\`. **Codespaces secrets are ignored**." >> "$GITHUB_STEP_SUMMARY"; fi
          if [ "$URL_OK" -eq 0 ] || [ "$KEY_OK" -eq 0 ]; then
            echo "::warning::Supabase secrets missing for this deploy — pixelcity.quest will show 'not configured'. Add Repository or github-pages Environment secrets, then re-run **Deploy to GitHub Pages**."
          fi
      - name: Write supabase-config.js + embed keys in index.html (works even if only HTML is mirrored)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node scripts/write-supabase-config.mjs _site/supabase-config.js
          node scripts/inject-supabase-inline.mjs _site/index.html
      - name: Warn if Supabase keys missing
        run: |
          if grep -qF "window.__SUPABASE_PUBLISHABLE_KEY__ = \"\"" _site/supabase-config.js; then
            echo "::warning::Built site still has empty key. Add VITE_SUPABASE_PUBLISHABLE_KEY (or SUPABASE_PUBLISHABLE_KEY / SUPABASE_ANON_KEY) and VITE_SUPABASE_URL (or SUPABASE_PROJECT_URL)."
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
