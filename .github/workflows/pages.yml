# Deploy the static game to GitHub Pages (optional).
# After merge to main: Settings → Pages → Source: GitHub Actions → add custom domain pixelcity.quest
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Build CSS (avoids cdn.tailwindcss.com at runtime)
        run: npm ci && npm run build:css
      - name: Prepare site root
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets vendor _site/
          cp config.js supabase-config.js _site/
      - name: Check Supabase secrets (Codespaces secrets do NOT apply — use Repository or Environment)
        env:
          SU: ${{ secrets.SUPABASE_URL }}
          SPU: ${{ secrets.SUPABASE_PROJECT_URL }}
          SPK: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SAK: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "## Supabase → GitHub Pages" >> "$GITHUB_STEP_SUMMARY"
          URL_OK=0; KEY_OK=0
          if [ -n "$SPU" ] || [ -n "$SU" ]; then URL_OK=1; echo "- ✅ URL secret found (SUPABASE_PROJECT_URL or SUPABASE_URL)" >> "$GITHUB_STEP_SUMMARY"; fi
          if [ -n "$SPK" ] || [ -n "$SAK" ]; then KEY_OK=1; echo "- ✅ Client key secret found (SUPABASE_PUBLISHABLE_KEY or SUPABASE_ANON_KEY)" >> "$GITHUB_STEP_SUMMARY"; fi
          if [ "$URL_OK" -eq 0 ]; then echo "- ❌ **Missing URL** — add \`SUPABASE_PROJECT_URL\` (value: \`https://xxxxx.supabase.co\`) under **Repo → Settings → Secrets and variables → Actions** (or **Settings → Environments → github-pages**)" >> "$GITHUB_STEP_SUMMARY"; fi
          if [ "$KEY_OK" -eq 0 ]; then echo "- ❌ **Missing key** — add \`SUPABASE_PUBLISHABLE_KEY\` (starts with \`sb_publishable_\`) same place. **Codespaces / Dependabot secrets are ignored** by this workflow." >> "$GITHUB_STEP_SUMMARY"; fi
          if [ "$URL_OK" -eq 0 ] || [ "$KEY_OK" -eq 0 ]; then
            echo "::warning::Supabase secrets missing for this deploy — pixelcity.quest will show 'not configured'. Add Repository or github-pages Environment secrets, then re-run **Deploy to GitHub Pages**."
          fi
      - name: Write supabase-config.js + embed keys in index.html (works even if only HTML is mirrored)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PROJECT_URL: ${{ secrets.SUPABASE_PROJECT_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node scripts/write-supabase-config.mjs _site/supabase-config.js
          node scripts/inject-supabase-inline.mjs _site/index.html
      - name: Warn if Supabase keys missing
        run: |
          if grep -qF "window.__SUPABASE_PUBLISHABLE_KEY__ = \"\"" _site/supabase-config.js; then
            echo "::warning::Built site still has empty key. Confirm secrets names are exact: SUPABASE_PROJECT_URL, SUPABASE_PUBLISHABLE_KEY (or legacy SUPABASE_ANON_KEY)."
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
